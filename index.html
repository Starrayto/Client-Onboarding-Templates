<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Documents</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f3f4f6;
}

/* PRINT CLEANUP */
@media print {
  body {
    margin: 0;
    background: #fff;
  }
}
</style>
</head>

<body class="p-6">

<!-- ================= WELCOME ================= -->
<div id="welcome" class="doc bg-white p-8 rounded-xl shadow max-w-4xl mx-auto mb-10">
  <h1 class="text-3xl font-bold text-center">WELCOME</h1>
  <p class="mt-4 text-center">Hi [Client Name],</p>

  <p class="mt-6 text-gray-600 text-center">
    Thank you for choosing us. We’re excited to work with you.
  </p>

  <div class="text-center mt-8">
    <button onclick="printSection('welcome')" class="bg-red-500 text-white px-6 py-2 rounded">
      Print Welcome
    </button>
  </div>
</div>

<!-- ================= AGREEMENT ================= -->
<div id="agreement" class="doc bg-white p-8 rounded-xl shadow max-w-4xl mx-auto mb-10">
  <h1 class="text-3xl font-bold text-center">CLIENT AGREEMENT</h1>

  <p class="mt-6 text-gray-600">
    This agreement outlines services and payment terms.
  </p>

  <div class="text-center mt-8">
    <button onclick="printSection('agreement')" class="bg-red-500 text-white px-6 py-2 rounded">
      Print Agreement
    </button>
  </div>
</div>

<!-- ================= GUIDE ================= -->
<div id="guide" class="doc bg-white p-8 rounded-xl shadow max-w-4xl mx-auto mb-10">
  <h1 class="text-3xl font-bold text-center">CONTENT GUIDE</h1>

  <p class="mt-6 text-gray-600">
    Do not send files via WhatsApp as it reduces quality.
  </p>

  <div class="text-center mt-8">
    <button onclick="printSection('guide')" class="bg-red-500 text-white px-6 py-2 rounded">
      Print Guide
    </button>
  </div>
</div>

<!-- ================= THANK YOU ================= -->
<div id="thankyou" class="doc bg-white p-8 rounded-xl shadow max-w-4xl mx-auto mb-10">
  <h1 class="text-3xl font-bold text-center">THANK YOU</h1>

  <p class="mt-6 text-gray-600 text-center">
    We appreciate working with you.
  </p>

  <div class="text-center mt-8">
    <button onclick="printSection('thankyou')" class="bg-red-500 text-white px-6 py-2 rounded">
      Print Thank You
    </button>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
function printSection(id) {
  const content = document.getElementById(id).outerHTML;

  const printWindow = window.open('', '_blank');

  printWindow.document.open();
  printWindow.document.write(`
    <html>
    <head>
      <title>Print</title>
      <link href="https://cdn.tailwindcss.com" rel="stylesheet">
      <style>
        body {
          font-family: 'Inter', sans-serif;
          padding: 20px;
        }
      </style>
    </head>
    <body>
      ${content}
    </body>
    </html>
  `);

  printWindow.document.close();

  printWindow.onload = () => {
    printWindow.print();
    printWindow.close();
  };
}
</script>

</body>
</html>
