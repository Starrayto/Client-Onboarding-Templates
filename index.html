<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Documents</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.tab-btn {
  padding: 10px 16px;
  border-radius: 8px;
  background: #e5e7eb;
  cursor: pointer;
}
.tab-btn.active {
  background: #111827;
  color: white;
}

.section { display: none; }
.section.active { display: block; }

@media print {
  .no-print { display:none !important; }
}
</style>
</head>

<body class="bg-gray-100 p-6">

<!-- ================= TABS ================= -->
<div class="flex gap-3 mb-6 no-print">
  <button class="tab-btn active" onclick="showTab(event,'welcome')">Welcome</button>
  <button class="tab-btn" onclick="showTab(event,'agreement')">Agreement</button>
</div>

<!-- ================= PRINT ================= -->
<script>
function printSection(id){
  const el = document.getElementById(id);
  const win = window.open('', '_blank');

  win.document.write(`
    <html>
    <head>
      <title>Print</title>
      <style>
        @page { size:A4; margin:12mm; }
        body{font-family:Inter,sans-serif;}
      </style>
    </head>
    <body>${el.outerHTML}</body>
    </html>
  `);

  win.document.close();
  win.onload = () => { win.print(); win.close(); };
}

function showTab(e,id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
}
</script>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="section active">

<div id="welcome-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">

<h1 class="text-3xl font-bold text-center">WELCOME</h1>

<p class="text-center mt-4">
Hi <span contenteditable="true">[Client Name]</span>
</p>

<p class="text-center mt-6 text-gray-600" contenteditable="true">
Thank you for choosing to work with us.
</p>

<div class="text-right mt-6 no-print">
<button onclick="printSection('welcome-content')" class="bg-red-500 text-white px-5 py-2 rounded">
Print
</button>
</div>

</div>

</div>

<!-- ================= AGREEMENT ================= -->
<div id="agreement" class="section">

<div id="agreement-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">

<h1 class="text-3xl font-bold text-center">CLIENT AGREEMENT</h1>

<p class="mt-6 text-gray-600" contenteditable="true">
Write agreement here...
</p>

<div class="text-right mt-6 no-print">
<button onclick="printSection('agreement-content')" class="bg-red-500 text-white px-5 py-2 rounded">
Print
</button>
</div>

</div>

</div>

</body>
</html>
