<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Documents</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.tab-btn {
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  background: #e5e7eb;
}
.tab-btn.active {
  background: #111827;
  color: white;
}
.section { display: none; }
.section.active { display: block; }

@media print {
  .no-print { display:none !important; }
}
</style>
</head>

<body class="bg-gray-100 p-6">

<!-- ================= TABS ================= -->
<div class="flex flex-wrap gap-3 mb-6 no-print">
  <button class="tab-btn active" onclick="showTab('welcome')">Welcome</button>
  <button class="tab-btn" onclick="showTab('agreement')">Agreement</button>
  <button class="tab-btn" onclick="showTab('guide')">Guide</button>
  <button class="tab-btn" onclick="showTab('competitor')">Competitor</button>
  <button class="tab-btn" onclick="showTab('monthly')">Monthly</button>
  <button class="tab-btn" onclick="showTab('thankyou')">Thank You</button>
</div>

<!-- ================= PRINT FUNCTION ================= -->
<script>
function printSection(id){
  const el = document.getElementById(id);
  const win = window.open('', '_blank');

  win.document.write(`
    <html>
    <head>
      <title>Print</title>
      <style>
        body{font-family:Inter,sans-serif;padding:20px;}
        *{box-shadow:none!important;}
      </style>
    </head>
    <body>${el.outerHTML}</body>
    </html>
  `);

  win.document.close();
  win.onload = () => { win.print(); win.close(); };
}

function showTab(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="section active">
<div id="welcome-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">WELCOME</h1>
<p class="text-center mt-3">Hi <span contenteditable="true">[Client Name]</span></p>

<div class="text-right mt-6 no-print">
<button onclick="printSection('welcome-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

<!-- ================= AGREEMENT ================= -->
<div id="agreement" class="section">
<div id="agreement-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">CLIENT AGREEMENT</h1>

<p class="mt-6" contenteditable="true">Agreement content...</p>

<div class="text-right mt-6 no-print">
<button onclick="printSection('agreement-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

<!-- ================= GUIDE ================= -->
<div id="guide" class="section">
<div id="guide-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">CONTENT GUIDE</h1>

<p class="mt-6" contenteditable="true">Guide content...</p>

<div class="text-right mt-6 no-print">
<button onclick="printSection('guide-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

<!-- ================= COMPETITOR ================= -->
<div id="competitor" class="section">
<div id="competitor-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">COMPETITOR ANALYSIS</h1>

<div class="text-right mt-6 no-print">
<button onclick="printSection('competitor-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

<!-- ================= MONTHLY ================= -->
<div id="monthly" class="section">
<div id="monthly-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">MONTHLY REPORT</h1>

<div class="text-right mt-6 no-print">
<button onclick="printSection('monthly-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

<!-- ================= THANK YOU ================= -->
<div id="thankyou" class="section">
<div id="thankyou-content" class="max-w-4xl mx-auto bg-white p-10 rounded-2xl shadow">
<h1 class="text-3xl font-bold text-center">THANK YOU</h1>

<div class="text-right mt-6 no-print">
<button onclick="printSection('thankyou-content')" class="bg-red-500 text-white px-5 py-2 rounded">Print</button>
</div>
</div>
</div>

</body>
</html>
